<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - SmartAuth</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <nav class="navbar" style="border: none;">
            <a href="/" class="logo">
                <div class="logo-icon"><i class="ri-shield-keyhole-fill"></i></div>
                SmartAuth
            </a>
        </nav>
        <main class="center-flex">
            <div class="auth-card glass-panel">
                <div class="auth-header">
                    <h1>Join Us</h1>
                    <p>Create an account to unlock all features</p>
                </div>

                <div id="errorAlert" class="alert alert-error"></div>
                <div id="successAlert" class="alert alert-success"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" minlength="2" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <small style="color: var(--text-secondary); font-size: 12px; margin-top: 4px; display: block;">
                            Min 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char.
                        </small>
                    </div>
                    <button type="submit" id="submitBtn" class="btn btn-primary btn-block">
                        <span class="loader"></span>
                        <span class="btn-text">Create Account <i class="ri-user-add-line"></i></span>
                    </button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Log in</a>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (api.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.classList.add('loading');
            btn.disabled = true;
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            try {
                // Register
                await api.register(name, email, password);

                // Immediately login after successful registration
                // Or you can instruct user to login manually, we will auto-login here
                await api.login(email, password);

                successAlert.textContent = 'Account created successfully! Redirecting...';
                successAlert.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (err) {
                errorAlert.textContent = err.message || 'Registration failed.';
                errorAlert.style.display = 'block';
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
