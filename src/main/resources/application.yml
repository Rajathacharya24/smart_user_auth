spring:
  application:
    name: smart-user-auth
  
  config:
    import: optional:classpath:jwt.yml

  datasource:
    url: jdbc:h2:mem:smartauthdb;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  jackson:
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

logging:
  level:
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:tc:postgresql:16:///smart_user_auth_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test

  jpa:
    show-sql: false

logging:
  level:
    root: WARN

---
spring:
  config:
    activate:
      on-profile: prod

server:
  forward-headers-strategy: framework

logging:
  level:
    root: INFO
